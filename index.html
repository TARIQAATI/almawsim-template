<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Template</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        function openPreviewModal() {
            document.getElementById('previewModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('previewModal').style.display = 'none';
        }
        
        function savePDF() {
            const element = document.getElementById('documentToExport');
            html2pdf(element);
        }
        
        function printDocument() {
            window.print();
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="left-panel" style="position: sticky; top: 0;">
            <form>
                <!-- Input form fields go here -->
                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Your Email">
                <button type="button" onclick="openPreviewModal()">Preview Document</button>
            </form>
        </div>
        <div class="right-section">
            <div id="previewModal" style="display:none;">
                <div class="modal-content">
                    <span class="close" style="cursor:pointer;" onclick="closeModal()">&times;</span>
                    <h2>Document Preview</h2>
                    <div id="documentToExport">
                        <!-- Document content for preview goes here -->
                    </div>
                    <button onclick="printDocument()">Print</button>
                    <button onclick="savePDF()">Save as PDF</button>
                </div>
            </div>
        </div>
    </div>
    <style>
        /* Responsive Design Improvements */
        .container {
            display: flex;
        }
        .left-panel {
            flex: 1;
            padding: 20px;
            /* Add more styling as needed */
        }
        .right-section {
            flex: 2;
            padding: 20px;
            /* Add more styling as needed */
        }
        .modal-content {
            position: fixed;
            z-index: 1;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border: 1px solid #888;
            /* Add additional styles for modal */
        }
        button {
            /* Improved button styling */
            padding: 10px 15px;
            margin: 5px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</body>
</html>
